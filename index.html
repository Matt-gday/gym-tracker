<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PCYC Gym">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>PCYC Gym Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --surface3: #252525;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --text2: #999;
  --text3: #666;
  --accent: #4ade80;
  --accent2: #22c55e;
  --accent-dim: rgba(74,222,128,0.1);
  --accent-dim2: rgba(74,222,128,0.2);
  --orange: #fb923c;
  --orange-dim: rgba(251,146,60,0.15);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.15);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.15);
  --yellow: #facc15;
  --radius: 16px;
  --radius-sm: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
*::-webkit-scrollbar { display:none; }
* { -ms-overflow-style:none; scrollbar-width:none; }

body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}

.app {
  max-width:600px;
  margin:0 auto;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  position:relative;
}

/* TAB BAR */
.tab-bar {
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:600px;
  display:flex;
  background:rgba(14,14,14,0.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:8px 4px calc(8px + var(--safe-bottom));
  z-index:100;
}
.tab-btn {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  padding:6px 2px;
  background:none;
  border:none;
  color:var(--text3);
  font-size:11px;
  font-family:'DM Sans',sans-serif;
  font-weight:500;
  cursor:pointer;
  transition:color 0.2s;
}
.tab-btn.active { color:var(--accent); }
.tab-btn svg { width:24px; height:24px; }

/* PAGES */
.page {
  display:none;
  flex:1;
  padding:calc(16px + var(--safe-top)) 16px calc(80px + var(--safe-bottom));
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.page.active { display:flex; flex-direction:column; }

/* HEADERS */
.page-title {
  font-size:32px;
  font-weight:700;
  letter-spacing:-0.5px;
  margin-bottom:4px;
}
.page-sub {
  font-size:16px;
  color:var(--text2);
  margin-bottom:20px;
  line-height:1.4;
}

/* CARDS */
.card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
  cursor:pointer;
  transition:background 0.15s, transform 0.1s;
}
.card:active { transform:scale(0.98); background:var(--surface2); }
.card-title { font-size:18px; font-weight:600; margin-bottom:4px; }
.card-meta { font-size:15px; color:var(--text2); }

/* WEEK CARDS */
.week-card {
  position:relative;
  overflow:hidden;
}
.week-card .week-num {
  font-family:'Space Mono',monospace;
  font-size:48px;
  font-weight:700;
  color:var(--accent-dim2);
  position:absolute;
  right:16px;
  top:50%;
  transform:translateY(-50%);
}
.week-card .week-info { position:relative; z-index:1; }
.week-card .week-label {
  font-size:14px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--accent);
  margin-bottom:4px;
}
.week-card .week-title { font-size:22px; font-weight:700; margin-bottom:2px; }
.week-card .week-detail { font-size:15px; color:var(--text2); }
.week-card.current { border-color:var(--accent); background:var(--accent-dim); }
.week-card.deload { border-color:var(--orange); }
.week-card.deload .week-label { color:var(--orange); }
.week-card.deload .week-num { color:rgba(251,146,60,0.15); }
.set-current-btn {
  position:absolute;
  right:16px;
  bottom:14px;
  padding:6px 14px;
  border-radius:8px;
  border:1px solid var(--accent);
  background:var(--accent-dim);
  color:var(--accent);
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  z-index:2;
}
.set-current-btn:active { background:var(--accent); color:var(--bg); }
.reset-week-btn {
  padding:8px 14px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text2);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  flex-shrink:0;
}
.reset-week-btn:active { background:var(--red-dim); color:var(--red); border-color:var(--red); }

/* Cardio options */
.cardio-opt {
  padding:12px 18px;
  border-radius:var(--radius-sm);
  border:2px solid var(--border);
  background:var(--surface);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:17px;
  font-weight:600;
  cursor:pointer;
  flex:1;
  min-width:calc(50% - 4px);
  text-align:center;
}
.cardio-opt:active { border-color:var(--accent); background:var(--accent-dim); color:var(--accent); }
.cardio-opt.selected { border-color:var(--accent); background:var(--accent-dim); color:var(--accent); }

/* DAY CARDS */
.day-card { position:relative; overflow:hidden; }
.day-card .day-icon {
  width:40px; height:40px;
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px;
  margin-bottom:10px;
}
.day-card .day-icon.squat { background:var(--accent-dim); color:var(--accent); }
.day-card .day-icon.bench { background:var(--blue-dim); color:var(--blue); }
.day-card .day-icon.dead { background:var(--orange-dim); color:var(--orange); }
.day-card .day-icon.upper { background:var(--red-dim); color:var(--red); }
.day-card .day-focus { font-size:15px; color:var(--text2); margin-bottom:2px; }
.day-card .day-name { font-size:20px; font-weight:700; }
.day-card .day-ex-count { font-size:15px; color:var(--text3); margin-top:4px; }
.day-card .day-progress {
  position:absolute; right:16px; top:50%; transform:translateY(-50%);
  font-family:'Space Mono',monospace;
  font-size:16px; color:var(--text3);
}
.day-card .day-progress .done { color:var(--accent); }
.day-card.completed-day { opacity:0.6; border-color:var(--accent); }
.day-card.completed-day .day-focus { color:var(--accent); }
.day-card.next-day { border-color:var(--accent); background:var(--accent-dim); }

/* EXERCISE LIST (DAY VIEW) */
.ex-list-item {
  display:flex;
  align-items:center;
  gap:8px;
  padding:16px 16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  margin-bottom:10px;
  cursor:pointer;
  transition:background 0.15s, transform 0.1s;
}
.ex-list-item:active { transform:scale(0.98); background:var(--surface2); }
.ex-list-item .ex-num {
  font-family:'Space Mono',monospace;
  font-size:18px;
  color:var(--text3);
  width:22px;
  flex-shrink:0;
}
.ex-list-item .ex-name {
  flex:1;
  font-size:18px;
  font-weight:500;
}
.ex-list-item .ex-sets-info {
  font-size:16px;
  color:var(--text3);
  font-weight:500;
}
.ex-list-item.completed { border-color:var(--accent); background:var(--accent-dim); }
.ex-list-item.completed .ex-num { color:var(--accent); }
.info-btn {
  width:34px; height:38px;
  border-radius:10px;
  background:var(--surface3);
  border:1px solid var(--border);
  color:var(--text2);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  font-family:'DM Sans',sans-serif;
  font-size:18px;
  font-weight:700;
}
.info-btn:active { background:var(--accent-dim); color:var(--accent); border-color:var(--accent); }
.ex-check {
  width:28px; height:28px;
  border-radius:50%;
  border:2px solid var(--border);
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.ex-list-item.completed .ex-check {
  border-color:var(--accent);
  background:var(--accent);
  color:var(--bg);
}

/* FULL SCREEN EXERCISE CARD */
.exercise-fullscreen {
  position:fixed;
  inset:0;
  background:var(--bg);
  z-index:200;
  display:none;
  flex-direction:column;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.exercise-fullscreen.active { display:flex; }
.ef-header {
  padding:calc(16px + var(--safe-top)) 16px 16px;
  display:flex;
  align-items:center;
  gap:14px;
  background:rgba(10,10,10,0.95);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:10;
}
.ef-back {
  width:48px; height:48px;
  border-radius:12px;
  background:var(--surface2);
  border:none;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  font-size:24px;
}
.ef-header-info { flex:1; }
.ef-header-info .ef-exnum { font-size:16px; color:var(--text3); }
.ef-header-info .ef-exname { font-size:28px; font-weight:700; }
.ef-body { flex:1; padding:20px 16px calc(20px + var(--safe-bottom)); }
.ef-actions { display:flex; gap:10px; margin-bottom:14px; }
.ef-action-btn {
  flex:1;
  padding:16px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:17px;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  cursor:pointer;
}
.ef-action-btn:active { background:var(--surface2); }
.ef-action-btn svg { width:20px; height:20px; }

.ef-section-title {
  font-size:18px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--text2);
  margin-bottom:8px;
}

/* SET ROWS */
.set-row {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
  padding:10px 14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
}
.set-label {
  font-family:'Space Mono',monospace;
  font-size:22px;
  font-weight:700;
  color:var(--text);
  width:28px;
  flex-shrink:0;
  white-space:nowrap;
}
.set-reps {
  font-size:22px;
  color:var(--text2);
  width:36px;
  flex-shrink:0;
}
.set-prev {
  font-size:22px;
  color:var(--text3);
  width:50px;
  flex-shrink:0;
  text-align:center;
}
.set-prev .prev-val { color:var(--text); font-weight:600; }
.set-input {
  flex:1;
  height:52px;
  border-radius:12px;
  border:2px solid var(--border);
  background:var(--surface2);
  color:var(--text);
  font-family:'Space Mono',monospace;
  font-size:32px;
  font-weight:700;
  text-align:center;
  outline:none;
  -webkit-appearance:none;
  min-width:0;
}
.set-input:focus { border-color:var(--accent); background:var(--accent-dim); }
.set-input::placeholder { color:var(--text3); font-size:18px; font-weight:400; }
.set-header {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  padding:0 14px;
}
.set-header span {
  font-size:14px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.5px;
  color:var(--text3);
}
.set-header .sh-set { width:28px; }
.set-header .sh-reps { width:36px; }
.set-header .sh-prev { width:50px; text-align:center; }
.set-header .sh-weight { flex:1; text-align:center; }

.ef-save-btn {
  width:100%;
  padding:18px;
  border-radius:var(--radius);
  border:none;
  background:var(--accent);
  color:var(--bg);
  font-family:'DM Sans',sans-serif;
  font-size:20px;
  font-weight:700;
  cursor:pointer;
  margin-top:12px;
}
.ef-save-btn:active { background:var(--accent2); }

/* NAV DOTS */
.ef-nav {
  display:flex;
  justify-content:center;
  gap:16px;
  padding:16px 0 0;
}
.ef-nav-btn {
  width:56px; height:56px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.ef-nav-btn:active { background:var(--surface2); }
.ef-nav-btn:disabled { opacity:0.3; }

/* MODAL */
.modal-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  z-index:300;
  display:none;
  align-items:flex-end;
  justify-content:center;
}
.modal-overlay.active { display:flex; }
.modal-sheet {
  width:100%;
  max-width:600px;
  max-height:85vh;
  background:var(--surface);
  border-radius:var(--radius) var(--radius) 0 0;
  padding:20px 20px calc(20px + var(--safe-bottom));
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.modal-handle {
  width:36px; height:4px;
  background:var(--text3);
  border-radius:2px;
  margin:0 auto 16px;
}
.modal-title { font-size:24px; font-weight:700; margin-bottom:4px; }
.modal-alt { font-size:15px; color:var(--accent); margin-bottom:12px; }
.modal-desc { font-size:16px; color:var(--text2); line-height:1.6; margin-bottom:16px; }
.modal-cues { margin-bottom:16px; }
.modal-cues .cue {
  display:flex; gap:8px; margin-bottom:8px;
  font-size:15px; color:var(--text2); line-height:1.5;
}
.modal-cues .cue-dot {
  width:6px; height:6px;
  border-radius:50%;
  background:var(--accent);
  margin-top:6px;
  flex-shrink:0;
}
.modal-video-btn {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:100%;
  padding:14px;
  border-radius:var(--radius-sm);
  border:none;
  background:#ff0000;
  color:#fff;
  font-family:'DM Sans',sans-serif;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
}
.modal-close {
  width:100%;
  padding:14px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:16px;
  font-weight:500;
  cursor:pointer;
  margin-top:10px;
}

/* BACK NAV */
.back-row {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:16px;
  cursor:pointer;
  color:var(--accent);
  font-size:16px;
  font-weight:500;
}
.back-row svg { width:18px; height:18px; }

/* PROGRAM TAB */
.prog-section { margin-bottom:24px; }
.prog-day-title {
  font-size:18px;
  font-weight:700;
  padding:10px 14px;
  background:var(--surface2);
  border-radius:var(--radius-sm) var(--radius-sm) 0 0;
  border:1px solid var(--border);
  border-bottom:none;
  display:flex;
  align-items:center;
  gap:10px;
}
.prog-day-title svg { width:22px; height:22px; flex-shrink:0; }
.prog-table {
  border:1px solid var(--border);
  border-radius:0 0 var(--radius-sm) var(--radius-sm);
  overflow:hidden;
}
.prog-row {
  display:grid;
  grid-template-columns:28px 1fr 44px 50px;
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  font-size:15px;
  align-items:center;
}
.prog-row:last-child { border-bottom:none; }
.prog-row.header {
  background:var(--surface2);
  font-weight:600;
  color:var(--text3);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.prog-row .pr-num { color:var(--text3); font-family:'Space Mono',monospace; }
.prog-row .pr-name { font-weight:500; }
.prog-row .pr-alt { color:var(--accent); font-size:13px; }
.prog-row .pr-sets, .prog-row .pr-reps { text-align:center; color:var(--text2); }

/* WEEK HEADER PILLS */
.prog-week-header {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  padding:4px 0 12px;
}
.prog-week-pill {
  padding:8px 10px;
  border-radius:20px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text2);
  font-size:15px;
  font-weight:500;
  white-space:nowrap;
  cursor:pointer;
  flex:1;
  text-align:center;
}
.prog-week-pill.active {
  background:var(--accent-dim);
  border-color:var(--accent);
  color:var(--accent);
}

/* ALL EXERCISES TAB */
.all-ex-item {
  display:flex;
  align-items:center;
  gap:12px;
  padding:16px 16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  margin-bottom:10px;
  cursor:pointer;
  transition:background 0.15s;
}
.all-ex-item:active { background:var(--surface2); }
.all-ex-item .aex-name { flex:1; font-size:18px; font-weight:500; }
.all-ex-item .aex-tag {
  font-size:13px;
  padding:3px 8px;
  border-radius:6px;
  font-weight:500;
}
.all-ex-item .aex-tag.shoulder { background:var(--accent-dim); color:var(--accent); }
.all-ex-item .aex-tag.cardio { background:var(--blue-dim); color:var(--blue); }

/* HISTORY TAB */
.hist-table {
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  overflow:hidden;
  margin-bottom:16px;
}
.hist-row {
  display:grid;
  grid-template-columns:1fr 80px 70px;
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  font-size:15px;
}
.hist-row:last-child { border-bottom:none; }
.hist-row.header {
  background:var(--surface2);
  font-weight:600;
  color:var(--text3);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

.export-btn {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:100%;
  padding:14px;
  border-radius:var(--radius);
  border:1px solid var(--accent);
  background:var(--accent-dim);
  color:var(--accent);
  font-family:'DM Sans',sans-serif;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  margin-bottom:16px;
}

/* SEARCH */
.search-box {
  width:100%;
  padding:14px 16px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:17px;
  outline:none;
  margin-bottom:16px;
  -webkit-appearance:none;
}
.search-box:focus { border-color:var(--accent); }
.search-box::placeholder { color:var(--text3); }

/* CATEGORY HEADERS */
.cat-header {
  font-size:14px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--text3);
  padding:12px 0 8px;
}

/* MISSED DAY BANNER */
.missed-banner {
  background:var(--orange-dim);
  border:1px solid var(--orange);
  border-radius:var(--radius-sm);
  padding:14px;
  margin-bottom:16px;
}
.missed-banner .mb-title { font-size:14px; font-weight:600; color:var(--orange); margin-bottom:6px; }

// --- DATA ---
const STORAGE_KEY = 'pcyc_gym_data';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function getWeightLog() {
  const d = loadData();
  return d.weights || {};
}
function getWeekOverrides() {
  const d = loadData();
  return d.weekOverrides || {};
}
function setWeekOverride(weekNum, override) {
  const d = loadData();
  if (!d.weekOverrides) d.weekOverrides = {};
  d.weekOverrides[weekNum] = override;
  saveData(d);
}
function isWeekOverridden(weekNum) {
  return !!getWeekOverrides()[weekNum];
}
function isDeloadWeek(weekNum) {
  return weekConfigs[weekNum] && weekConfigs[weekNum].deload && !isWeekOverridden(weekNum);
}

// Progress tracking
function getCurrentWeek() {
  const d = loadData();
  return d.currentWeek || 14;
}
function setCurrentWeek(weekNum) {
  const d = loadData();
  d.currentWeek = weekNum;
  saveData(d);
}
function getCompletedDays() {
  // Returns { weekNum: { mon: true, wed: true, thu: false } }
  const d = loadData();
  return d.completedDays || {};
}
function markDayCompleted(weekNum, dayKey) {
  const d = loadData();
  if (!d.completedDays) d.completedDays = {};
  if (!d.completedDays[weekNum]) d.completedDays[weekNum] = {};
  d.completedDays[weekNum][dayKey] = true;
  saveData(d);
}
function isDayCompleted(weekNum, dayKey) {
  const cd = getCompletedDays();
  return cd[weekNum] && cd[weekNum][dayKey];
}
function getNextDay(weekNum) {
  const schedule = weekSchedule[weekNum];
  if (!schedule) return null;
  const dayOrder = ['mon','wed','thu'];
  for (const dk of dayOrder) {
    if (!isDayCompleted(weekNum, dk)) return dk;
  }
  return null; // all done
}
function isWeekCompleted(weekNum) {
  return getNextDay(weekNum) === null;
}

// Weight saving - saves once per exercise per day, locked after save
function saveWeights(exerciseId, weekNum, date, sets, wasDeload) {
  const d = loadData();
  if (!d.weights) d.weights = {};
  if (!d.weights[exerciseId]) d.weights[exerciseId] = [];
  // Don't allow duplicate non-reset entry for same date
  const existing = d.weights[exerciseId].find(e => e.date === date && !e.reset);
  if (existing) return; // already saved today, don't overwrite
  d.weights[exerciseId].push({ week: weekNum, date, sets, deload: !!wasDeload });
  saveData(d);
}
function getTodaysWeights(exerciseId) {
  const today = new Date().toISOString().split('T')[0];
  const w = getWeightLog()[exerciseId];
  if (!w) return null;
  return w.find(e => e.date === today && !e.reset) || null;
}
function getLastWeights(exerciseId, skipDeload, excludeToday) {
  const w = getWeightLog()[exerciseId];
  if (!w || w.length === 0) return null;
  const today = new Date().toISOString().split('T')[0];
  let entries = w.filter(e => !e.reset).sort((a,b) => new Date(b.date) - new Date(a.date));
  if (excludeToday) {
    entries = entries.filter(e => e.date !== today);
  }
  if (skipDeload) {
    entries = entries.filter(e => !e.deload);
  }
  return entries.length > 0 ? entries[0] : null;
}
function getAllWeights(exerciseId) {
  const w = getWeightLog()[exerciseId];
  if (!w) return [];
  return w.sort((a,b) => new Date(b.date) - new Date(a.date));
}

function formatSetsHtml(sets) {
  if (!sets || sets.length === 0) return '';
  // Cardio: first value is a machine name string
  if (sets[0] && isNaN(sets[0]) && !sets[0].includes(':')) {
    return '<span class="hist-entry-set">' + sets[0] + ' — ' + (sets[1]||'?') + ' min</span>';

      const parts = s.split(':');
      return '<span class="hist-entry-set">S'+(i+1)+': '+parts[0]+'L / '+parts[1]+'R</span>';
    }).join('');
  }
  // Standard: just kg values
  return sets.map((s,i) => '<span class="hist-entry-set">S'+(i+1)+': '+s+'kg</span>').join('');
}

function render() {
  const app = document.getElementById('app');

function renderTabBar() {

function renderPage() {
  switch(state.activeTab) {
    case 'today': return renderTodayPage();
    case 'exercises': return renderExercisesPage();
    case 'program': return renderProgramPage();
    case 'history': return renderHistoryPage();
    default: return '';
  }
}

// --- TODAY / ROUTINE PAGE ---
function renderTodayPage() {
  if (state.view === 'day' && state.selectedDay) return renderDayView();
  if (state.view === 'days') return renderDaysView();
  return renderWeeksView();
}

function renderWeeksView() {
  // Check if all 4 weeks are completed — if so, reset
  const allDone = [14,15,16,17].every(w => isWeekCompleted(w));
  if (allDone) {
    // Reset all completed days
    const d = loadData();
    d.completedDays = {};
    saveData(d);
  }

  return `<div class="page active fade-in">
    <div class="page-title">Your Program</div>
    <div class="page-sub">Weeks 14–17 · 4-week block</div>
    ${[14,15,16,17].map(w => {
      const wc = weekConfigs[w];
      const completed = isWeekCompleted(w);
      const nextDay = getNextDay(w);
      const dayLabels = {mon:'Monday',wed:'Wednesday',thu:'Thursday'};
      const daysCompleted = ['mon','wed','thu'].filter(dk => isDayCompleted(w, dk)).length;
      let statusText = '';
      if (completed) statusText = 'Completed';
      else if (daysCompleted > 0) statusText = daysCompleted + '/3 days done';
      return `<div class="card week-card ${wc.deload?'deload':''} ${completed?'current':''}" data-action="selectWeek" data-week="${w}">
        <div class="week-num">${w}</div>
        <div class="week-info">
          <div class="week-label">${completed?'COMPLETED · ':''}${wc.type === 'A' ? 'A Week' : 'B Week'}${wc.deload?' · DELOAD':''}</div>
          <div class="week-title">Week ${w}</div>
          <div class="week-detail">${wc.pct}% intensity · ${wc.deload?'Recovery':'RPE '+wc.rpe}</div>
          ${statusText ? '<div class="week-detail" style="margin-top:4px;color:var(--accent);font-weight:600">'+statusText+'</div>' : ''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderDaysView() {
  const w = state.currentWeek;
  const wc = weekConfigs[w];
  const overridden = isWeekOverridden(w);
  const effectiveType = wc.type;
  const rot = weekSchedule[w];
  const days = [
    { key:rot.mon, label:'Monday', dayKey:'mon' },
    { key:rot.wed, label:'Wednesday', dayKey:'wed' },
    { key:rot.thu, label:'Thursday', dayKey:'thu' }
  ];
  // For reps display, if deload is overridden, use the matching A/B full-rep week
  const repWeek = (wc.deload && overridden) ? (wc.type === 'B' ? 15 : 14) : w;

  const hasSomeProgress = ['mon','wed','thu'].some(dk => isDayCompleted(w, dk));

  return `<div class="page active fade-in">
    <div class="back-row" data-action="backToWeeks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      All Weeks
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div class="page-title" style="margin-bottom:0">Week ${w}</div>
      ${hasSomeProgress ? '<button class="reset-week-btn" data-action="resetWeek" data-week="'+w+'">Reset Week</button>' : ''}
    </div>
    <div class="page-sub">${wc.desc}</div>
    ${wc.deload ? `
      <div class="override-toggle">
        <div class="ot-info">
          <div class="ot-label">${overridden ? 'Full sets active' : 'Deload week'}</div>
          <div class="ot-desc">${overridden ? 'Using full sets & reps instead of deload' : 'Toggle on to use full sets & reps'}</div>
        </div>
        <button class="toggle-switch ${overridden?'on':''}" data-action="toggleOverride" data-week="${w}"></button>
      </div>
    ` : ''}
    ${(!wc.deload && overridden) ? '' : ''}
    ${days.map(d => {
      const dd = dayDefinitions[d.key];
      const exList = dd.exercises.filter(e => !exercises[effectiveType==='A'?e.a:e.b].isCardio);
      const dayDone = isDayCompleted(w, d.dayKey);
      const nextDayKey = getNextDay(w);
      const isNext = d.dayKey === nextDayKey;
      const logged = exList.filter(e => {
        const exId = effectiveType==='A' ? e.a : e.b;
        const last = getLastWeights(exId, false, false);
        return last && last.week === w;
      }).length;
      return `<div class="card day-card ${dayDone?'completed-day':''} ${isNext?'next-day':''}" data-action="selectDay" data-daykey="${d.key}" data-daylabel="${d.label}">
        <div class="day-icon ${dd.iconClass}">${dd.icon}</div>
        <div class="day-focus">${d.label}${dayDone?' — Done':isNext?' — Up Next':''}</div>
        <div class="day-name">${dd.name}</div>
        <div class="day-ex-count">${exList.length} exercises + cardio</div>
        <div class="day-progress"><span class="${dayDone?'done':''}">${logged}/${exList.length}</span></div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderDayView() {
  const w = state.currentWeek;
  const wc = weekConfigs[w];
  const dd = dayDefinitions[state.selectedDay];
  const weekType = wc.type;
  const overridden = isWeekOverridden(w);
  const repWeek = (wc.deload && overridden) ? (wc.type === 'B' ? 15 : 14) : w;
  // Find which dayKey this is (mon/wed/thu)
  const rot = weekSchedule[w];
  let thisDayKey = null;
  if (rot.mon === state.selectedDay) thisDayKey = 'mon';
  else if (rot.wed === state.selectedDay) thisDayKey = 'wed';
  else if (rot.thu === state.selectedDay) thisDayKey = 'thu';
  // Check if this specific day slot is completed
  const dayDone = thisDayKey ? isDayCompleted(w, thisDayKey) : false;

  return `<div class="page active fade-in">
    <div class="back-row" data-action="backToDays">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Week ${w}
    </div>
    <div class="page-title">${dd.name}</div>
    <div class="page-sub">${wc.desc}${overridden && wc.deload ? ' · Full sets override' : ''}</div>
    ${dd.exercises.map((ex, i) => {
      const exId = weekType === 'A' ? ex.a : ex.b;
      const exData = exercises[exId];
      const wd = ex.data[repWeek];
      const todaySaved = !!getTodaysWeights(exId);
      const isCardio = exData.isCardio;
      return `<div class="ex-list-item ${todaySaved?'completed':''}" data-action="openExercise" data-exid="${exId}" data-exindex="${i}">
        <div class="ex-check">${todaySaved?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}</div>
        <div class="ex-num">${i+1}</div>
        <div class="ex-name">${exData.name}</div>
        <div class="ex-sets-info">${isCardio ? '10 min' : wd.s+'×'+wd.r}</div>
        <button class="info-btn" data-action="showInfo" data-exid="${exId}">?</button>
      </div>`;
    }).join('')}
    ${!dayDone && thisDayKey ? `
      <button class="ef-save-btn" data-action="markDayComplete" data-daykey="${thisDayKey}" style="margin-top:12px">Mark Day Complete</button>
    ` : dayDone ? `
      <div style="text-align:center;color:var(--accent);font-size:18px;font-weight:600;padding:20px 0">Day Complete</div>
    ` : ''}
  </div>`;
}

// --- EXERCISE FULLSCREEN ---
function renderExerciseFullscreen() {
  if (!state.selectedExercise) return '<div class="exercise-fullscreen"></div>';
  const exId = state.selectedExercise;
  const ex = exercises[exId];
  const ctx = state.selectedExerciseContext;
  const w = state.currentWeek;
  const dd = ctx ? dayDefinitions[ctx.dayKey] : null;
  const wc = weekConfigs[w];
  const weekType = wc.type;
  const overridden = isWeekOverridden(w);
  const repWeek = (wc.deload && overridden) ? (wc.type === 'B' ? 15 : 14) : w;
  const currentIsDeload = wc.deload && !overridden;
  const exDef = dd ? dd.exercises[ctx.exerciseIndex] : null;
  const wd = exDef ? exDef.data[repWeek] : {s:3, r:'?'};
  const numSets = wd.s || 0;
  // Prev weights: skip deload, exclude today so prev always shows PREVIOUS session
  const last = getLastWeights(exId, true, true);
  const prevSets = last ? last.sets : [];
  // Today's saved entry (if any)

// --- CSV EXPORT ---
function exportCSV() {
  const allWeights = getWeightLog();
  let csv = 'Exercise,Date,Week,Set 1,Set 1 L,Set 1 R,Set 2,Set 2 L,Set 2 R,Set 3,Set 3 L,Set 3 R,Set 4,Set 4 L,Set 4 R,Type\n';
  Object.entries(allWeights).forEach(([exId, entries]) => {
    const ex = exercises[exId];
    const name = ex ? ex.name : exId;
    const type = ex && ex.isCardio ? 'cardio' : ex && ex.isDB ? 'dumbbell' : 'barbell';
    entries.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(e => {
      const cols = [];
      for (let i = 0; i < 4; i++) {
        const val = e.sets[i] || '';
        if (val.includes && val.includes(':')) {
          const parts = val.split(':');
          cols.push('', parts[0]||'', parts[1]||'');
        } else {
          cols.push(val, '', '');
        }
      }
      csv += `"${name}",${e.date},${e.week},${cols.join(',')},${type}\n`;
    });
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'pcyc_gym_log_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function exportJSON() {
  const data = loadData();
  data._exportDate = new Date().toISOString();
  data._appVersion = 'PCYC Gym Tracker v1';
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'pcyc_gym_backup_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.weights && !data.weekOverrides) {
        alert('This file does not appear to be a valid PCYC Gym backup.');
        return;
      }
      if (confirm('This will replace all current data with the imported backup. Continue?')) {
        // Merge: keep existing structure, overwrite with imported
        saveData(data);
        render();
        alert('Data imported successfully.');
      }
    } catch(err) {
      alert('Could not read file. Make sure it is a valid JSON backup.');
    }
  };
  reader.readAsText(file);
}

// --- EVENT BINDING ---
function bindEvents() {
  // Tab buttons (these are re-created each render so need fresh listeners)
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const newTab = btn.dataset.tab;
      if (newTab !== 'today') {
        // Switching to a non-routine tab — close any open exercise/modal but keep view state
        state.selectedExercise = null;
        state.editingExercise = false;
      }
      state.activeTab = newTab;
      state.historyExercise = null;
      modalExId = null;
      modalMode = null;
      render();
    });
  });
  // Document-level listeners are bound once below, not here
}

function handleAction(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  // Prevent parent action from also firing for nested buttons
  if (action === 'showInfo' || action === 'showExHistory') {
    e.preventDefault();
    e.stopImmediatePropagation();
  }

  // For closeModal on the overlay, ignore if the click was inside the sheet content (not on a button)
  if (action === 'closeModal') {
    const sheet = e.target.closest('[data-modal-sheet]');
    const clickedButton = e.target.closest('button, a');
    if (sheet && !clickedButton) return; // clicked inside sheet but not on a button, ignore
  }

  switch(action) {
    case 'selectWeek':
      state.currentWeek = parseInt(el.dataset.week);
      state.view = 'days';
      render();
      break;
    case 'backToWeeks':
      state.view = 'weeks';
      state.selectedDay = null;
      render();
      break;
    case 'selectDay':
      state.selectedDay = el.dataset.daykey;
      state.view = 'day';
      render();
      break;
    case 'backToDays':
      state.view = 'days';
      state.selectedDay = null;
      state.selectedExercise = null;
      render();
      break;
    case 'openExercise': {
      const exId = el.dataset.exid;
      const idx = parseInt(el.dataset.exindex);
      state.selectedExercise = exId;
      state.selectedExerciseContext = { dayKey: state.selectedDay, weekNum: state.currentWeek, exerciseIndex: idx };
      render();
      break;
    }
    case 'closeExercise':
      state.selectedExercise = null;
      state.selectedExerciseContext = null;
      state.editingExercise = false;
      render();
      break;
    case 'prevExercise':
    case 'nextExercise': {
      if (!state.selectedExerciseContext) break;
      state.editingExercise = false;
      const ctx = state.selectedExerciseContext;
      const dd = dayDefinitions[ctx.dayKey];
      const wc = weekConfigs[state.currentWeek];
      const newIdx = action === 'prevExercise' ? ctx.exerciseIndex - 1 : ctx.exerciseIndex + 1;
      if (newIdx < 0 || newIdx >= dd.exercises.length) break;
      const exDef = dd.exercises[newIdx];
      const newExId = wc.type === 'A' ? exDef.a : exDef.b;
      state.selectedExercise = newExId;
      state.selectedExerciseContext = { ...ctx, exerciseIndex: newIdx };
      render();
      break;
    }
    case 'saveWeights': {
      const ex = exercises[state.selectedExercise];
      let sets = [];
      if (ex && ex.isDB) {
        // Collect L/R pairs
        const lefts = document.querySelectorAll('.db-left');
        const rights = document.querySelectorAll('.db-right');
        lefts.forEach((inp, i) => {
          const l = inp.value || '';
          const r = rights[i] ? rights[i].value || '' : '';
          sets.push(l + ':' + r);
        });
      } else {
        const inputs = document.querySelectorAll('.set-input:not(.db-left):not(.db-right):not(.cardio-duration)');
        inputs.forEach(inp => {
          sets.push(inp.value || '');
        });
      }
      if (sets.some(s => s !== '' && s !== ':')) {
        const today = new Date().toISOString().split('T')[0];
        const wc = weekConfigs[state.currentWeek];
        const wasDeload = wc.deload && !isWeekOverridden(state.currentWeek);
        if (state.editingExercise) {
          const d = loadData();
          if (d.weights && d.weights[state.selectedExercise]) {
            const idx = d.weights[state.selectedExercise].findIndex(e => e.date === today && !e.reset);
            if (idx !== -1) {
              d.weights[state.selectedExercise][idx].sets = sets;
              saveData(d);
            }
          }
          state.editingExercise = false;
        } else {
          saveWeights(state.selectedExercise, state.currentWeek, today, sets, wasDeload);
        }
        render();
      }
      break;
    }
    case 'editWeights': {
      state.editingExercise = true;
      render();
      break;
    }
    case 'selectCardio': {
      state.selectedCardioMachine = el.dataset.machine;
      document.querySelectorAll('.cardio-opt').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.machine === state.selectedCardioMachine);
      });
      break;
    }
    case 'saveCardio': {
      const machine = state.selectedCardioMachine;
      if (!machine) {
        // Flash the machine buttons to indicate selection needed
        document.querySelectorAll('.cardio-opt').forEach(btn => {
          btn.style.borderColor = 'var(--red)';
          setTimeout(() => btn.style.borderColor = '', 500);
        });
        break;
      }
      const duration = document.querySelector('.cardio-duration');
      const mins = duration ? duration.value : '10';
      const today = new Date().toISOString().split('T')[0];
      const wc = weekConfigs[state.currentWeek];
      const wasDeload = wc.deload && !isWeekOverridden(state.currentWeek);
      saveWeights(state.selectedExercise, state.currentWeek, today, [machine, mins], wasDeload);
      state.selectedCardioMachine = null;
      render();
      break;
    }
    case 'showInfo':
      e.stopPropagation();
      modalExId = el.dataset.exid;
      modalMode = 'info';
      render();
      break;
    case 'showExHistory':
      e.stopPropagation();
      modalExId = el.dataset.exid;
      modalMode = 'history';
      render();
      break;
    case 'closeModal':
      modalExId = null;
      modalMode = null;
      state.resetWeekNum = null;
      render();
      break;
    case 'progWeek':
      state.programViewWeek = parseInt(el.dataset.week);
      render();
      break;
    case 'toggleOverride': {
      const weekNum = parseInt(el.dataset.week);
      setWeekOverride(weekNum, !isWeekOverridden(weekNum));
      render();
      break;
    }
    case 'markDayComplete': {
      const dayKey = el.dataset.daykey;
      markDayCompleted(state.currentWeek, dayKey);
      render();
      break;
    }
    case 'resetWeek': {
      modalExId = null;
      modalMode = 'confirmReset';
      state.resetWeekNum = parseInt(el.dataset.week);
      render();
      break;
    }
    case 'confirmResetWeek': {
      const weekNum = state.resetWeekNum;
      const d = loadData();
      // Clear day completion markers
      if (d.completedDays) {
        delete d.completedDays[weekNum];
      }
      // Flag all weight entries for this week as reset (keeps history but hides from active views)
      if (d.weights) {
        Object.keys(d.weights).forEach(exId => {
          d.weights[exId].forEach(entry => {
            if (entry.week === weekNum) {
              entry.reset = true;
            }
          });
        });
      }
      saveData(d);
      modalMode = null;
      state.resetWeekNum = null;
      render();
      break;
    }
    case 'exportCSV':
      exportCSV();
      break;
    case 'exportJSON':
      exportJSON();
      break;
    case 'importJSON':
      document.getElementById('jsonImportInput').click();
      break;
    case 'resetAllData':
      modalExId = null;
      modalMode = 'confirmResetAll';
      render();
      break;
    case 'confirmResetAll':
      localStorage.removeItem(STORAGE_KEY);
      modalMode = null;
      render();
      break;
    case 'openExFromList': {
      const exId = el.dataset.exid;
      const ex = exercises[exId];
      if (ex.isCardio) {
        modalExId = exId;
        modalMode = 'info';
      } else {
        state.selectedExercise = exId;
        // Find context - pick first matching day/week
        let found = false;
        const wc = weekConfigs[state.currentWeek];
        for (const [dayKey, dd] of Object.entries(dayDefinitions)) {
          dd.exercises.forEach((exDef, i) => {
            const thisExId = wc.type === 'A' ? exDef.a : exDef.b;
            if (thisExId === exId && !found) {
              state.selectedExerciseContext = { dayKey, weekNum: state.currentWeek, exerciseIndex: i };
              found = true;
            }
          });
          if (found) break;
        }
        if (!found) {
          // Try other week type
          const otherType = wc.type === 'A' ? 'B' : 'A';
          for (const [dayKey, dd] of Object.entries(dayDefinitions)) {
            dd.exercises.forEach((exDef, i) => {
              const thisExId = otherType === 'A' ? exDef.a : exDef.b;
              if (thisExId === exId && !found) {
                state.selectedExerciseContext = { dayKey, weekNum: state.currentWeek, exerciseIndex: i };
                found = true;
              }
            });
            if (found) break;
          }
        }
      }
      render();
      break;
    }
    case 'viewExHistory':
      state.historyExercise = el.dataset.exid;
      render();
      break;
    case 'backToHistory':
      state.historyExercise = null;
      render();
      break;
  }
}

function handleInput(e) {
  if (e.target.dataset.action === 'searchExercises') {
    state.allExSearch = e.target.value;
    // Debounced re-render of list only
    clearTimeout(handleInput._t);
    handleInput._t = setTimeout(() => render(), 150);
  }
}

// --- INIT ---
// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(() => {});
}
document.addEventListener('click', handleAction);
document.addEventListener('input', handleInput);
render();

// File import listener
document.addEventListener('change', function(e) {
  if (e.target && e.target.id === 'jsonImportInput') {
    if (e.target.files.length > 0) {
      importJSON(e.target.files[0]);
      e.target.value = '';
    }
  }
});
</script>
